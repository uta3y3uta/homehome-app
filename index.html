<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ていしゅつ ほめほめアプリ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Yu Gothic", "Meiryo", sans-serif;
    background: linear-gradient(160deg, #fff9e6 0%, #ffeef5 50%, #e8f7ff 100%);
    min-height: 100vh;
    user-select: none;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; flex-wrap: wrap; gap: 8px;
  }
  h1 { font-size: 1.5rem; color: #ff8c42; text-shadow: 1px 1px 0 #fff; }
  .header-btns { display: flex; gap: 8px; }
  .small-btn {
    border: none; border-radius: 12px; padding: 10px 16px; font-size: 1rem;
    cursor: pointer; font-family: inherit; font-weight: bold;
    background: #fff; color: #666; box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }
  .small-btn:active { transform: scale(.95); }

  /* 宿題タブ */
  #hwTabs {
    display: flex; gap: 10px; padding: 4px 16px 12px; flex-wrap: wrap;
  }
  .hw-tab {
    border: 3px solid transparent; border-radius: 999px; padding: 10px 20px;
    font-size: 1.15rem; font-weight: bold; cursor: pointer; font-family: inherit;
    background: #fff; color: #888; box-shadow: 0 2px 6px rgba(0,0,0,.1);
  }
  .hw-tab.active { background: #ffb703; color: #fff; border-color: #ff8c42; }
  .hw-tab .count { font-size: .85rem; margin-left: 6px; opacity: .85; }

  /* 名前グリッド */
  #grid {
    display: grid; gap: 12px; padding: 8px 16px 40px;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  }
  .name-btn {
    border: none; border-radius: 18px; padding: 22px 8px; font-size: 1.5rem;
    font-weight: bold; cursor: pointer; font-family: inherit;
    background: #fff; color: #444; box-shadow: 0 4px 10px rgba(0,0,0,.12);
    transition: transform .1s, background .2s; position: relative; line-height: 1.3;
  }
  .name-btn:active { transform: scale(.93); }
  .name-btn.done {
    background: linear-gradient(135deg, #6ee7b7, #34d399);
    color: #fff;
  }
  .name-btn.done::after {
    content: "✓ できた！"; display: block; font-size: .9rem; margin-top: 4px;
  }
  .name-btn.pop { animation: pop .45s ease; }
  @keyframes pop {
    0% { transform: scale(1); } 40% { transform: scale(1.15); } 100% { transform: scale(1); }
  }
  #progressBar {
    margin: 0 16px 12px; height: 18px; background: #fff; border-radius: 999px;
    overflow: hidden; box-shadow: inset 0 1px 4px rgba(0,0,0,.15);
  }
  #progressFill {
    height: 100%; width: 0%; border-radius: 999px;
    background: linear-gradient(90deg, #ffb703, #ff8c42); transition: width .4s;
  }
  #allDoneMsg {
    text-align: center; font-size: 1.6rem; color: #ff5d8f; font-weight: bold;
    padding: 8px; display: none;
  }

  /* ほめメッセージ */
  #praise {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%) scale(0);
    font-size: 3rem; font-weight: bold; color: #ff5d8f;
    text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
    pointer-events: none; z-index: 50; white-space: nowrap;
  }
  #praise.show { animation: praisePop 1.3s ease forwards; }
  @keyframes praisePop {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    30% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
    70% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%,-60%) scale(1); opacity: 0; }
  }
  canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 40; }

  /* 設定モーダル */
  #settingsModal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100;
    align-items: flex-start; justify-content: center; overflow-y: auto; padding: 24px 12px;
  }
  #settingsModal.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 20px; padding: 24px; width: 100%; max-width: 560px;
  }
  .modal-box h2 { color: #ff8c42; margin-bottom: 12px; font-size: 1.2rem; }
  .modal-box section { margin-bottom: 24px; }
  .edit-list { list-style: none; margin-bottom: 10px; }
  .edit-list li {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    border-bottom: 1px dashed #eee;
  }
  .edit-list li span { flex: 1; font-size: 1.05rem; }
  .icon-btn {
    border: none; background: #f2f2f2; border-radius: 8px; width: 34px; height: 34px;
    cursor: pointer; font-size: 1rem;
  }
  .icon-btn.del { background: #ffe3e3; }
  .add-row { display: flex; gap: 8px; }
  .add-row input {
    flex: 1; padding: 10px; font-size: 1rem; border: 2px solid #ddd; border-radius: 10px;
    font-family: inherit;
  }
  .add-row button {
    padding: 10px 18px; border: none; border-radius: 10px; background: #ffb703;
    color: #fff; font-weight: bold; font-size: 1rem; cursor: pointer; font-family: inherit;
  }
  .danger-btn {
    width: 100%; padding: 12px; border: none; border-radius: 12px; background: #ffe3e3;
    color: #d33; font-weight: bold; font-size: 1rem; cursor: pointer; font-family: inherit;
  }
  .close-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px; background: #34d399;
    color: #fff; font-weight: bold; font-size: 1.1rem; cursor: pointer; font-family: inherit;
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>🌟 ていしゅつ ほめほめアプリ</h1>
  <div class="header-btns">
    <button class="small-btn" id="resetBtn">🔄 きょうのリセット</button>
    <button class="small-btn" id="settingsBtn">⚙️ せってい</button>
  </div>
</header>

<div id="hwTabs"></div>
<div id="progressBar"><div id="progressFill"></div></div>
<div id="allDoneMsg">🎉 ぜんいん だせました！すごい！ 🎉</div>
<div id="grid"></div>

<div id="praise"></div>
<canvas id="confetti"></canvas>

<div id="settingsModal">
  <div class="modal-box">
    <section>
      <h2>👦👧 めいぼ（名前）</h2>
      <ul class="edit-list" id="nameList"></ul>
      <div class="add-row">
        <input id="nameInput" placeholder="名前を入力（例：さくら）" maxlength="12">
        <button id="addNameBtn">追加</button>
      </div>
    </section>
    <section>
      <h2>📚 しゅくだいの種類</h2>
      <ul class="edit-list" id="hwList"></ul>
      <div class="add-row">
        <input id="hwInput" placeholder="例：漢字ノート" maxlength="14">
        <button id="addHwBtn">追加</button>
      </div>
    </section>
    <section>
      <button class="danger-btn" id="clearAllBtn">⚠️ すべての提出記録を消す</button>
    </section>
    <button class="close-btn" id="closeSettingsBtn">とじる</button>
  </div>
</div>

<script>
const PRAISES = ["やったね！","すごい！","えらい！","がんばったね！","さすが！","かんぺき！","ナイス！","すてき！"];
const DEFAULT = {
  names: ["さくら","ひなた","りく","ゆい","そうた","あかり","はると","めい"],
  homeworks: ["漢字ノート","音読カード","算数プリント"],
  done: {},        // { "宿題名": { "名前": true } }
  activeHw: 0
};
let state = load();

function load() {
  try {
    const s = JSON.parse(localStorage.getItem("homehome") || "null");
    if (s && s.names && s.homeworks) return s;
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save() { localStorage.setItem("homehome", JSON.stringify(state)); }

function currentHw() { return state.homeworks[state.activeHw] || state.homeworks[0]; }
function isDone(name) { return !!(state.done[currentHw()] && state.done[currentHw()][name]); }

function render() {
  if (state.activeHw >= state.homeworks.length) state.activeHw = 0;
  // タブ
  const tabs = document.getElementById("hwTabs");
  tabs.innerHTML = "";
  state.homeworks.forEach((hw, i) => {
    const b = document.createElement("button");
    b.className = "hw-tab" + (i === state.activeHw ? " active" : "");
    const doneCount = Object.values(state.done[hw] || {}).filter(Boolean).length;
    b.innerHTML = `${hw}<span class="count">${doneCount}/${state.names.length}</span>`;
    b.onclick = () => { state.activeHw = i; save(); render(); };
    tabs.appendChild(b);
  });
  // グリッド
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  state.names.forEach(name => {
    const b = document.createElement("button");
    b.className = "name-btn" + (isDone(name) ? " done" : "");
    b.textContent = name;
    b.onclick = () => toggle(name, b);
    grid.appendChild(b);
  });
  // 進捗
  const total = state.names.length;
  const doneN = state.names.filter(isDone).length;
  document.getElementById("progressFill").style.width = total ? (doneN/total*100) + "%" : "0%";
  document.getElementById("allDoneMsg").style.display = (total > 0 && doneN === total) ? "block" : "none";
}

function toggle(name, btn) {
  const hw = currentHw();
  if (!state.done[hw]) state.done[hw] = {};
  if (state.done[hw][name]) {
    // 取り消し（押しまちがい用）
    if (confirm(name + " さんの「" + hw + "」提出を取り消しますか？")) {
      delete state.done[hw][name];
      save(); render();
    }
    return;
  }
  state.done[hw][name] = true;
  save();
  btn.classList.add("done","pop");
  showPraise(name);
  confettiBurst();
  setTimeout(render, 500);
}

function showPraise(name) {
  const p = document.getElementById("praise");
  p.textContent = name + "さん " + PRAISES[Math.floor(Math.random()*PRAISES.length)];
  p.classList.remove("show");
  void p.offsetWidth;
  p.classList.add("show");
}

/* 紙吹雪 */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
let pieces = [];
function sizeCanvas(){ canvas.width = innerWidth; canvas.height = innerHeight; }
addEventListener("resize", sizeCanvas); sizeCanvas();
function confettiBurst() {
  const colors = ["#ff5d8f","#ffb703","#34d399","#60a5fa","#c084fc","#ff8c42"];
  for (let i = 0; i < 90; i++) {
    pieces.push({
      x: innerWidth/2 + (Math.random()-.5)*200,
      y: innerHeight*0.35,
      vx: (Math.random()-.5)*12,
      vy: -Math.random()*11 - 3,
      size: Math.random()*8+5,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*Math.PI*2,
      vr: (Math.random()-.5)*.3,
      life: 110
    });
  }
}
(function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces = pieces.filter(p => p.life > 0);
  pieces.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += .35; p.rot += p.vr; p.life--;
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.globalAlpha = Math.min(1, p.life/30);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
    ctx.restore();
  });
})();

/* リセット */
document.getElementById("resetBtn").onclick = () => {
  if (confirm("「" + currentHw() + "」の提出記録をリセットしますか？")) {
    state.done[currentHw()] = {};
    save(); render();
  }
};

/* 設定 */
const modal = document.getElementById("settingsModal");
document.getElementById("settingsBtn").onclick = () => { renderSettings(); modal.classList.add("open"); };
document.getElementById("closeSettingsBtn").onclick = () => { modal.classList.remove("open"); render(); };

function renderSettings() {
  renderEditList("nameList", state.names, (arr)=>{ state.names = arr; });
  renderEditList("hwList", state.homeworks, (arr)=>{ state.homeworks = arr; });
}
function renderEditList(id, arr, setArr) {
  const ul = document.getElementById(id);
  ul.innerHTML = "";
  arr.forEach((item, i) => {
    const li = document.createElement("li");
    const span = document.createElement("span");
    span.textContent = item;
    const up = mkBtn("↑", () => { if(i>0){ [arr[i-1],arr[i]]=[arr[i],arr[i-1]]; setArr(arr); save(); renderSettings(); } });
    const down = mkBtn("↓", () => { if(i<arr.length-1){ [arr[i+1],arr[i]]=[arr[i],arr[i+1]]; setArr(arr); save(); renderSettings(); } });
    const edit = mkBtn("✏️", () => {
      const v = prompt("新しい名前", item);
      if (v && v.trim()) {
        renameKey(id, item, v.trim());
        arr[i] = v.trim(); setArr(arr); save(); renderSettings();
      }
    });
    const del = mkBtn("🗑️", () => {
      if (confirm("「" + item + "」を削除しますか？")) {
        arr.splice(i,1); setArr(arr); save(); renderSettings();
      }
    });
    del.classList.add("del");
    li.append(span, up, down, edit, del);
    ul.appendChild(li);
  });
}
function renameKey(listId, oldName, newName) {
  if (listId === "hwList" && state.done[oldName]) {
    state.done[newName] = state.done[oldName]; delete state.done[oldName];
  }
  if (listId === "nameList") {
    Object.values(state.done).forEach(m => {
      if (m[oldName]) { m[newName] = m[oldName]; delete m[oldName]; }
    });
  }
}
function mkBtn(label, fn) {
  const b = document.createElement("button");
  b.className = "icon-btn"; b.textContent = label; b.onclick = fn;
  return b;
}
document.getElementById("addNameBtn").onclick = () => addItem("nameInput", state.names);
document.getElementById("addHwBtn").onclick = () => addItem("hwInput", state.homeworks);
document.getElementById("nameInput").addEventListener("keydown", e => { if(e.key==="Enter") addItem("nameInput", state.names); });
document.getElementById("hwInput").addEventListener("keydown", e => { if(e.key==="Enter") addItem("hwInput", state.homeworks); });
function addItem(inputId, arr) {
  const inp = document.getElementById(inputId);
  const v = inp.value.trim();
  if (!v) return;
  if (arr.includes(v)) { alert("同じ名前がすでにあります"); return; }
  arr.push(v); inp.value = "";
  save(); renderSettings();
}
document.getElementById("clearAllBtn").onclick = () => {
  if (confirm("すべての宿題の提出記録を消します。よろしいですか？")) {
    state.done = {}; save(); renderSettings();
  }
};

render();
</script>
</body>
</html>
